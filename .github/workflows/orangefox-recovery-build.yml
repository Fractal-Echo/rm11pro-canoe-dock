name: OrangeFox Recovery Build

on:
  workflow_dispatch:
    inputs:
      full_build:
        description: Run the manual OrangeFox source sync and recoveryimage build.
        required: true
        default: false
        type: boolean
      orangefox_branch:
        description: OrangeFox sync branch.
        required: true
        default: "14.1"
        type: string
      jobs:
        description: Parallel build jobs for mka.
        required: true
        default: "4"
        type: string
  pull_request:
  push:
    branches:
      - main
      - "build/**"
      - "ci/**"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  validate:
    name: Lightweight Validation
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install validation tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Check patch whitespace
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ] && [ -n "${GITHUB_BASE_REF:-}" ]; then
            git diff --check "origin/${GITHUB_BASE_REF}...HEAD"
          elif git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            git diff --check HEAD~1..HEAD
          else
            git diff --check
          fi
          git diff --check

      - name: Verify OrangeFox repo agreement
        run: scripts/ci/verify-orangefox-github-build.sh

  manual-full-build:
    name: Manual Full Recovery Build
    runs-on: ubuntu-24.04
    needs: validate
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_build }}
    timeout-minutes: 360
    env:
      ORANGEFOX_TREE: /mnt/fox_14.1
      BUILD_ENV_FILE: ${{ github.workspace }}/out/github-orangefox-nx809j.env
      ARTIFACTS_DIR: ${{ github.workspace }}/out/github-orangefox-nx809j
      BUILD_LOG: ${{ github.workspace }}/out/github-orangefox-nx809j-build.log
      PRODUCT_CODENAME: NX809J
      LUNCH_TARGET: orangefox_NX809J-ap2a-eng
      BUILD_GOALS: adbd recoveryimage
      JOBS: ${{ inputs.jobs }}
      ORANGEFOX_BRANCH: ${{ inputs.orangefox_branch }}
      USE_CCACHE: 1
      CCACHE_DIR: /mnt/ccache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show runner state
        run: |
          set -euo pipefail
          uname -a
          nproc
          free -h
          df -h

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            git curl python3 python-is-python3 repo rsync \
            bc bison build-essential ccache flex \
            g++-multilib gcc-multilib gnupg gperf \
            imagemagick lib32ncurses-dev lib32readline-dev \
            lib32z1-dev lz4 libncurses-dev libsdl1.2-dev \
            libssl-dev libwxgtk3.2-dev libxml2-dev \
            libxml2-utils lzop pngcrush schedtool \
            squashfs-tools xsltproc zip zlib1g-dev openjdk-17-jdk
          mkdir -p "$HOME/bin" "$CCACHE_DIR"
          if ! command -v repo >/dev/null 2>&1; then
            curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo -o "$HOME/bin/repo"
            chmod 0755 "$HOME/bin/repo"
            echo "$HOME/bin" >>"$GITHUB_PATH"
          fi
          ccache --max-size=20G
          java -version
          df -h

      - name: Sync OrangeFox source
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$ORANGEFOX_TREE")"
          available_gb="$(df -BG "$(dirname "$ORANGEFOX_TREE")" | awk 'NR==2 {gsub("G","",$4); print $4}')"
          if [ "$available_gb" -lt 120 ]; then
            printf 'WARN: only %sGB available before sync; GitHub-hosted runners may be too small for a full build.\n' "$available_gb"
          fi
          bash scripts/orangefox-sync/orangefox_sync.sh --branch "$ORANGEFOX_BRANCH" --path "$ORANGEFOX_TREE"
          df -h

      - name: Write build environment
        run: |
          set -euo pipefail
          mkdir -p "$ARTIFACTS_DIR" "$(dirname "$BUILD_ENV_FILE")"
          cat >"$BUILD_ENV_FILE" <<EOF
          ORANGEFOX_TREE="$ORANGEFOX_TREE"
          DEVICE_TREE_SOURCE="${GITHUB_WORKSPACE}/recovery/device/zte/sm88XX"
          DEVICE_TREE_DEST_REL="device/nubia/NX809J"
          DEVICE_TREE_MODE="copy"
          PRODUCT_CODENAME="$PRODUCT_CODENAME"
          LUNCH_TARGET="$LUNCH_TARGET"
          BUILD_GOALS="$BUILD_GOALS"
          JOBS="$JOBS"
          ARTIFACTS_DIR="$ARTIFACTS_DIR"
          export RM11_INCLUDE_ANDROID16_PREBUILTS=false
          EOF
          sed -n '1,120p' "$BUILD_ENV_FILE"

      - name: Prepare device tree and dumpvars
        run: |
          set -euo pipefail
          scripts/local-build/build-orangefox-nx809j-local.sh --env "$BUILD_ENV_FILE" --force-device-tree --skip-build
          cd "$ORANGEFOX_TREE"
          set +u
          source build/envsetup.sh
          lunch "$LUNCH_TARGET"
          {
            printf 'TARGET_PRODUCT=%s\n' "$(get_build_var TARGET_PRODUCT)"
            printf 'TARGET_DEVICE=%s\n' "$(get_build_var TARGET_DEVICE)"
            printf 'PRODUCT_DEVICE=%s\n' "$(get_build_var PRODUCT_DEVICE)"
            printf 'TARGET_DEVICE_DIR=%s\n' "$(get_build_var TARGET_DEVICE_DIR)"
            printf 'TARGET_BOARD_PLATFORM=%s\n' "$(get_build_var TARGET_BOARD_PLATFORM)"
            printf 'PRODUCT_PLATFORM=%s\n' "$(get_build_var PRODUCT_PLATFORM)"
            printf 'TARGET_BOOTLOADER_BOARD_NAME=%s\n' "$(get_build_var TARGET_BOOTLOADER_BOARD_NAME)"
            printf 'TARGET_CPU_VARIANT_RUNTIME=%s\n' "$(get_build_var TARGET_CPU_VARIANT_RUNTIME)"
            printf 'BOARD_BOOT_HEADER_VERSION=%s\n' "$(get_build_var BOARD_BOOT_HEADER_VERSION)"
            printf 'BOARD_RECOVERYIMAGE_PARTITION_SIZE=%s\n' "$(get_build_var BOARD_RECOVERYIMAGE_PARTITION_SIZE)"
            printf 'BOARD_EXCLUDE_KERNEL_FROM_RECOVERY_IMAGE=%s\n' "$(get_build_var BOARD_EXCLUDE_KERNEL_FROM_RECOVERY_IMAGE)"
          } >"$ARTIFACTS_DIR/dumpvars.txt"
          set -u
          sed -n '1,160p' "$ARTIFACTS_DIR/dumpvars.txt"

      - name: Build recovery image
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$BUILD_LOG")" "$ARTIFACTS_DIR"
          set +e
          scripts/local-build/build-orangefox-nx809j-local.sh --env "$BUILD_ENV_FILE" --force-device-tree 2>&1 | tee "$BUILD_LOG"
          status="${PIPESTATUS[0]}"
          cp -p "$BUILD_LOG" "$ARTIFACTS_DIR/build.log"
          exit "$status"

      - name: Refresh safe artifact hashes
        if: always()
        run: |
          set -euo pipefail
          mkdir -p "$ARTIFACTS_DIR"
          if find "$ARTIFACTS_DIR" -maxdepth 1 -type f \( -name 'recovery.img' -o -name 'OrangeFox*.img' -o -name 'build.log' -o -name 'dumpvars.txt' \) | grep -q .; then
            (
              cd "$ARTIFACTS_DIR"
              find . -maxdepth 1 -type f \( -name 'recovery.img' -o -name 'OrangeFox*.img' -o -name 'build.log' -o -name 'dumpvars.txt' \) -print0 \
                | sort -z \
                | xargs -0 sha256sum >SHA256SUMS
            )
          fi
          find "$ARTIFACTS_DIR" -maxdepth 1 -type f -print | sort

      - name: Upload safe build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orangefox-nx809j-${{ github.run_number }}
          path: |
            ${{ env.ARTIFACTS_DIR }}/recovery.img
            ${{ env.ARTIFACTS_DIR }}/OrangeFox*.img
            ${{ env.ARTIFACTS_DIR }}/build.log
            ${{ env.ARTIFACTS_DIR }}/SHA256SUMS
            ${{ env.ARTIFACTS_DIR }}/dumpvars.txt
          if-no-files-found: warn
