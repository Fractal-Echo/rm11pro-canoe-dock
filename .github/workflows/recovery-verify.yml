name: Recovery Verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  recovery-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Verify recovery lane
        run: scripts/ci/verify-recovery-route1.sh
