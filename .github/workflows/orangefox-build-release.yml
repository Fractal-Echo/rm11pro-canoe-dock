name: OrangeFox Build And Release

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish or update the fixed orangefox-nx809j-latest release after a successful build.
        required: true
        default: true
        type: boolean
      prerelease:
        description: Mark the GitHub release as a prerelease.
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: orangefox-nx809j-latest-release
  cancel-in-progress: false

jobs:
  orangefox-build-release:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      ORANGEFOX_TREE: /mnt/fox_14.1
      ARTIFACTS_DIR: ${{ github.workspace }}/out/github-orangefox-nx809j
      BUILD_ENV_FILE: ${{ github.workspace }}/out/github-orangefox-nx809j.env
      CCACHE_DIR: /mnt/ccache
      USE_CCACHE: 1
      PRODUCT_CODENAME: NX809J
      LUNCH_TARGET: orangefox_NX809J-ap2a-eng
      BUILD_GOALS: adbd recoveryimage
      JOBS: 4
      RELEASE_TAG: orangefox-nx809j-latest
    steps:
      - name: Checkout dock
        uses: actions/checkout@v4

      - name: Show initial disk and runner state
        run: |
          set -euxo pipefail
          uname -a
          nproc
          free -h
          df -h

      - name: Free runner disk space
        run: |
          set -euxo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /opt/hostedtoolcache/Python /opt/hostedtoolcache/node || true
          sudo rm -rf /usr/local/share/boost /usr/local/share/chromium /usr/local/lib/node_modules || true
          sudo rm -rf /opt/az /opt/microsoft /opt/pipx /opt/google-cloud-cli || true
          sudo swapoff -a || true
          sudo rm -f /mnt/swapfile /swapfile || true
          sudo apt-get clean
          sudo docker system prune -af || true
          df -h

      - name: Configure swap and Git
        run: |
          set -euxo pipefail
          if [ "$(free -m | awk '/^Swap:/ {print $2}')" -lt 8192 ]; then
            sudo swapoff /mnt/orangefox-swapfile || true
            sudo rm -f /mnt/orangefox-swapfile
            sudo fallocate -l 8G /mnt/orangefox-swapfile
            sudo chmod 600 /mnt/orangefox-swapfile
            sudo mkswap /mnt/orangefox-swapfile
            sudo swapon /mnt/orangefox-swapfile
          fi
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          sudo mkdir -p "$ORANGEFOX_TREE"
          sudo chown -R "$USER:$USER" "$ORANGEFOX_TREE"
          sudo mkdir -p "$CCACHE_DIR"
          sudo chown -R "$USER:$USER" "$CCACHE_DIR"
          free -h
          df -h

      - name: Install build dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          if apt-cache show openjdk-11-jdk >/dev/null 2>&1; then
            jdk_package=openjdk-11-jdk
          else
            jdk_package=openjdk-17-jdk
          fi
          sudo apt-get install -y \
            git curl wget python3 python-is-python3 \
            bc bison build-essential ccache flex \
            g++-multilib gcc-multilib gnupg gperf \
            imagemagick lib32ncurses-dev lib32readline-dev \
            lib32z1-dev lz4 libncurses-dev libsdl1.2-dev \
            libssl-dev libwxgtk3.2-dev libxml2-dev \
            libxml2-utils lzop pngcrush repo rsync schedtool \
            squashfs-tools xsltproc zip zlib1g-dev "$jdk_package"
          ccache --max-size=20G
          java -version
          df -h

      - name: Sync OrangeFox 14.1 source
        run: |
          set -euxo pipefail
          mkdir -p "$(dirname "$ORANGEFOX_TREE")"
          available_gb="$(df -BG "$(dirname "$ORANGEFOX_TREE")" | awk 'NR==2 {gsub("G","",$4); print $4}')"
          if [ "$available_gb" -lt 120 ]; then
            printf 'WARN: only %sGB available before OrangeFox sync; this public runner may not be large enough for a full build.\n' "$available_gb"
          fi
          bash scripts/orangefox-sync/orangefox_sync.sh --branch 14.1 --path "$ORANGEFOX_TREE"
          df -h

      - name: Write build environment
        run: |
          set -euxo pipefail
          mkdir -p "$(dirname "$BUILD_ENV_FILE")"
          {
            printf 'ORANGEFOX_TREE=%q\n' "$ORANGEFOX_TREE"
            printf 'DEVICE_TREE_SOURCE=%q\n' "${GITHUB_WORKSPACE}/recovery/device/zte/sm88XX"
            printf 'DEVICE_TREE_DEST_REL=%q\n' "device/nubia/NX809J"
            printf 'DEVICE_TREE_MODE=%q\n' "copy"
            printf 'PRODUCT_CODENAME=%q\n' "$PRODUCT_CODENAME"
            printf 'LUNCH_TARGET=%q\n' "$LUNCH_TARGET"
            printf 'BUILD_GOALS=%q\n' "$BUILD_GOALS"
            printf 'JOBS=%q\n' "$JOBS"
            printf 'ARTIFACTS_DIR=%q\n' "$ARTIFACTS_DIR"
            printf 'export RM11_INCLUDE_ANDROID16_PREBUILTS=false\n'
          } >"$BUILD_ENV_FILE"
          cat "$BUILD_ENV_FILE"

      - name: Build OrangeFox recovery
        run: |
          set -euxo pipefail
          scripts/local-build/build-orangefox-nx809j-local.sh --env "$BUILD_ENV_FILE" --force-device-tree
          df -h

      - name: Prepare release notes
        run: |
          set -euxo pipefail
          mkdir -p "$ARTIFACTS_DIR"
          {
            printf '%s\n' 'OrangeFox NX809J build produced by GitHub Actions.'
            printf '\n'
            printf '%s\n' 'This is a build artifact, not proof that recovery boot, touch, ADB, MTP, decryption, flashing ZIPs, backup/restore, fastbootd, or USB OTG are working on-device.'
            printf '\n'
            printf '%s\n' 'Test cautiously on `recovery_a` first and keep stock recovery rollback ready.'
          } >"$ARTIFACTS_DIR/RELEASE-NOTES.md"
          ls -lah "$ARTIFACTS_DIR"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: orangefox-nx809j-${{ github.run_number }}
          path: |
            ${{ env.ARTIFACTS_DIR }}/*
          if-no-files-found: error

      - name: Move fixed release tag
        if: inputs.publish_release
        run: |
          set -euxo pipefail
          git tag -f "$RELEASE_TAG" "$GITHUB_SHA"
          git push --force origin "refs/tags/$RELEASE_TAG"

      - name: Publish GitHub release
        if: inputs.publish_release
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euxo pipefail
          assets=()
          while IFS= read -r artifact; do
            assets+=("$artifact")
          done < <(find "$ARTIFACTS_DIR" -maxdepth 1 -type f \( -name 'OrangeFox*.img' -o -name 'OrangeFox*.zip' -o -name 'recovery.img' -o -name 'SHA256SUMS' \) | sort)
          [ "${#assets[@]}" -gt 0 ]

          flags=()
          if [ "$PRERELEASE" = "true" ]; then
            flags+=(--prerelease)
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG" --notes-file "$ARTIFACTS_DIR/RELEASE-NOTES.md" "${flags[@]}"
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" --title "$RELEASE_TAG" --notes-file "$ARTIFACTS_DIR/RELEASE-NOTES.md" "${flags[@]}"
          fi
